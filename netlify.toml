# Netlify configuration — In-Alpes Chalet Services.
#
# The SSR app is built by the TanStack Start (nitro) pipeline with the `netlify`
# preset (vite.config.ts) → static assets in `dist/`, the SSR handler in
# `.netlify/functions-internal/`. Our own API lives in `netlify/functions/` and
# owns the /api/* routes via each function's `export const config = { path }`
# (Netlify Functions v2) — matched ahead of the framework SSR catch-all.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  # Make the frontend call the live functions in production (baked at build).
  VITE_API_MODE = "live"

[functions]
  # Bundle the shared lib + JSON fixtures imported by the functions.
  node_bundler = "esbuild"
  included_files = ["netlify/lib/**", "src/data/*.json"]

[dev]
  framework = "vite"
  targetPort = 8080

# --- Security headers -------------------------------------------------------
# CSP allow-list matches what the app actually loads: Google Fonts (stylesheet +
# gstatic font files), Cloudinary (image display + signed browser upload), and
# the OpenStreetMap iframe. 'unsafe-inline' is required for SSR hydration and
# inline style attributes; a nonce-based CSP would be a future tightening.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; img-src 'self' data: https://res.cloudinary.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.cloudinary.com; frame-src https://www.openstreetmap.org; form-action 'self'"

# Never cache the admin app shell or admin API responses.
[[headers]]
  for = "/admin/*"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/api/admin/*"
  [headers.values]
    Cache-Control = "no-store"
