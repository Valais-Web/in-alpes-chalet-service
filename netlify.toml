# Netlify configuration — In-Alpes Chalet Services.
#
# The SSR app is built by the TanStack Start (nitro) pipeline with the `netlify`
# preset (vite.config.ts) → static assets in `dist/`, the SSR handler in
# `.netlify/functions-internal/`. Our own API lives in `netlify/functions/` and
# owns the /api/* routes via each function's `export const config = { path }`
# (Netlify Functions v2) — matched ahead of the framework SSR catch-all.

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  # Make the frontend call the live functions in production (baked at build).
  VITE_API_MODE = "live"

[functions]
  # Bundle the shared lib + JSON fixtures imported by the functions.
  node_bundler = "esbuild"
  included_files = ["netlify/lib/**", "src/data/*.json"]

[dev]
  framework = "vite"
  targetPort = 8080
